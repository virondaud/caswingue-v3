<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Tête Hybrid - Bleu - Forme bois mais plus petite -->
  <path d="M22 16 Q16 20 14 28 Q12 35 14 42 Q17 48 24 52 Q32 55 40 54 Q48 51 50 44 Q52 38 50 32 Q48 26 44 22 Q38 18 32 16 Q26 14 22 16 Z"
        fill="url(#hybridGrad)" stroke="#1a3a6a" stroke-width="1.5"/>
  <!-- Face de frappe visible à gauche -->
  <path d="M22 18 Q16 22 14 30 Q13 35 14 42 Q17 47 22 50"
        fill="url(#faceGrad)" stroke="#0a2a5a" stroke-width="2.5"/>
  <!-- Surface de la face -->
  <path d="M23 20 Q18 24 16 30 Q15 35 16 42 Q18 46 23 48"
        fill="#3a6a9a" opacity="0.3"/>
  <!-- Rainures sur la face -->
  <line x1="16" y1="28" x2="22" y2="26" stroke="#2a4a7a" stroke-width="0.8" opacity="0.5"/>
  <line x1="15" y1="33" x2="22" y2="31" stroke="#2a4a7a" stroke-width="0.8" opacity="0.5"/>
  <line x1="15" y1="38" x2="22" y2="36" stroke="#2a4a7a" stroke-width="0.8" opacity="0.5"/>
  <!-- Couronne -->
  <path d="M24 18 Q32 18 40 20 Q46 24 48 28"
        fill="none" stroke="#1a3a6a" stroke-width="0.8" opacity="0.4"/>
  <!-- Reflet couronne -->
  <ellipse cx="36" cy="28" rx="7" ry="4" fill="white" opacity="0.1"/>
  <!-- Point d'alignement -->
  <line x1="36" y1="18" x2="36" y2="22" stroke="#2a5a9a" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <!-- Hosel -->
  <ellipse cx="22" cy="16" rx="2.5" ry="3" fill="#2a5a8a" stroke="#1a3a6a" stroke-width="1"/>
  <defs>
    <linearGradient id="hybridGrad" x1="0.8" y1="0" x2="0.2" y2="1">
      <stop offset="0%" stop-color="#5a9ad5"/>
      <stop offset="30%" stop-color="#3a7abb"/>
      <stop offset="60%" stop-color="#2a5a9a"/>
      <stop offset="100%" stop-color="#1a4a8a"/>
    </linearGradient>
    <linearGradient id="faceGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a4a8a"/>
      <stop offset="100%" stop-color="#3a6aa0"/>
    </linearGradient>
  </defs>
</svg>