<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Tête de Driver - Noir - Grande tête, face bien visible -->
  <path d="M12 6 Q4 10 2 22 Q0 34 2 44 Q6 54 16 58 Q28 62 42 60 Q54 56 60 46 Q62 38 60 28 Q58 20 52 16 Q44 10 32 8 Q20 5 12 6 Z"
        fill="url(#driverGrad)" stroke="#111" stroke-width="1.5"/>
  <!-- Face de frappe large et visible -->
  <path d="M12 8 Q5 14 3 24 Q1 34 3 44 Q6 52 14 56"
        fill="url(#faceGrad)" stroke="#000" stroke-width="2.5"/>
  <!-- Surface de la face -->
  <path d="M13 10 Q7 16 5 26 Q3 34 5 44 Q7 50 13 54"
        fill="#444" opacity="0.3"/>
  <!-- Rainures sur la face -->
  <line x1="6" y1="22" x2="12" y2="19" stroke="#555" stroke-width="0.8" opacity="0.5"/>
  <line x1="5" y1="28" x2="12" y2="25" stroke="#555" stroke-width="0.8" opacity="0.5"/>
  <line x1="4" y1="34" x2="12" y2="31" stroke="#555" stroke-width="0.8" opacity="0.5"/>
  <line x1="5" y1="40" x2="12" y2="37" stroke="#555" stroke-width="0.8" opacity="0.5"/>
  <line x1="6" y1="46" x2="12" y2="43" stroke="#555" stroke-width="0.8" opacity="0.5"/>
  <!-- Couronne -->
  <path d="M14 8 Q26 10 40 12 Q52 16 58 22"
        fill="none" stroke="#222" stroke-width="0.8" opacity="0.5"/>
  <!-- Reflet couronne -->
  <ellipse cx="38" cy="22" rx="12" ry="6" fill="white" opacity="0.12"/>
  <!-- Point d'alignement -->
  <line x1="38" y1="10" x2="38" y2="15" stroke="#666" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <!-- Hosel -->
  <ellipse cx="12" cy="6" rx="3.5" ry="4" fill="#333" stroke="#111" stroke-width="1"/>
  <defs>
    <linearGradient id="driverGrad" x1="0.8" y1="0" x2="0.2" y2="1">
      <stop offset="0%" stop-color="#4a4a4a"/>
      <stop offset="30%" stop-color="#2a2a2a"/>
      <stop offset="60%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="faceGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#333"/>
    </linearGradient>
  </defs>
</svg>